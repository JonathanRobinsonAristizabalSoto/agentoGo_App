name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, xml, curl, json, zip, pdo, pdo_sqlite

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction

      - name: Prepare .env and sqlite DB
        run: |
          cp .env.example .env
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php -r "file_put_contents('.env', str_replace('\nAPP_ENV=local', '\nAPP_ENV=testing', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('DB_CONNECTION=mysql', 'DB_CONNECTION=sqlite', file_get_contents('.env')));"
          mkdir -p database && touch database/database.sqlite

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Generate OpenAPI docs
        run: php artisan l5-swagger:generate

      - name: Run tests
        run: vendor/bin/phpunit --configuration phpunit.xml --testdox
